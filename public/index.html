<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Music Design Assistant | BMAsia</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Libre+Caslon+Text:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ============ Design Tokens ============ */
:root {
  /* Base surfaces — aligned with bmasiamusic.com */
  --bg-deep: #09090b;
  --bg: #0f0f0f;
  --bg-elevated: #161822;
  --bg-hover: #1c1f2e;
  /* Glass layers */
  --glass: rgba(255,255,255,0.04);
  --glass-hover: rgba(255,255,255,0.07);
  --glass-active: rgba(255,255,255,0.10);
  --glass-border: rgba(255,255,255,0.08);
  --glass-border-hover: rgba(255,255,255,0.14);
  /* Text */
  --text: #f0f0f3;
  --text-secondary: #a1a1b5;
  --text-muted: #5e5e72;
  --text-on-accent: #ffffff;
  /* Borders */
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.12);
  /* BMAsia brand — aligned with bmasiamusic.com */
  --brand-orange: #EFA634;
  --brand-orange-dark: #d99530;
  --brand-orange-dim: rgba(239,166,52,0.15);
  --brand-navy: #1a1a2e;
  /* Accent — BMAsia gold */
  --accent: #EFA634;
  --accent-hover: #d99530;
  --accent-light: #f5b84d;
  --accent-soft: rgba(239,166,52,0.15);
  --accent-glow: rgba(239,166,52,0.25);
  --accent-ultra-light: rgba(239,166,52,0.06);
  /* Gradient anchors */
  --grad-1: #1a1000;
  --grad-2: #0c1520;
  --grad-3: #1a0e00;
  --grad-4: #0c1219;
  /* Semantic */
  --success: #22c55e;
  --success-soft: rgba(34,197,94,0.15);
  --error: #ef4444;
  --error-soft: rgba(239,68,68,0.15);
  /* Layout */
  --radius: 14px;
  --radius-sm: 8px;
  --radius-lg: 20px;
  --radius-pill: 999px;
  /* Shadows */
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.3);
  /* Timing */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast: 150ms;
  --dur-normal: 250ms;
  --dur-slow: 400ms;
}

[data-theme="beatbreeze"] {
  --accent: #F59E0B;
  --accent-hover: #D97706;
  --accent-light: #fbbf24;
  --accent-soft: rgba(245,158,11,0.15);
  --accent-glow: rgba(245,158,11,0.25);
  --accent-ultra-light: rgba(245,158,11,0.06);
  --grad-1: #1a0f00;
  --grad-2: #0f1520;
  --grad-3: #1a0800;
  --grad-4: #0c1219;
}

/* ============ Body ============ */
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "rlig" 1, "calt" 1;
  min-height: 100dvh;
}
body.welcome-active {
  overflow: hidden;
  height: 100dvh;
}
body.chat-active {
  overflow-y: auto;
}

/* ============ App Shell ============ */
.app-shell {
  width: 100%;
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  position: relative;
  padding-top: 64px;
}
@media (min-width: 768px) {
  .app-shell { padding-top: 80px; }
}
.welcome-active .app-shell { height: 100dvh; overflow: hidden; padding-top: 0; }
.welcome-active .input-bar { display: none; }
.welcome-active .chat-area { max-width: none; padding: 0; }

/* ============ Header (matches bmasiamusic.com) ============ */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 50;
  background: transparent;
  height: 64px;
  transition: background 0.3s ease, box-shadow 0.3s ease, backdrop-filter 0.3s ease;
}
.header.scrolled {
  background: rgba(15,15,15,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.header:not(.scrolled) {
  background: linear-gradient(to bottom, rgba(15,15,15,0.7), transparent);
}
@media (min-width: 768px) {
  .header { height: 80px; }
}
.header-inner {
  max-width: 80rem;
  margin: 0 auto;
  padding: 0 16px;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-logo-link {
  position: relative;
  z-index: 57;
  display: inline-flex;
  border-radius: 8px;
  transition: transform 0.15s ease;
}
.header-logo-link:hover { transform: scale(1.02); }
.header-logo-link:active { transform: scale(0.98); }
.header-logo-link img {
  height: 32px;
  width: auto;
  object-fit: contain;
}
@media (min-width: 768px) {
  .header-logo-link img { height: 40px; }
}

/* Desktop Navigation */
.header-nav-desktop {
  display: none;
  align-items: center;
  gap: 4px;
}
@media (min-width: 768px) {
  .header-nav-desktop { display: flex; }
}
@media (min-width: 1024px) {
  .header-nav-desktop { gap: 8px; }
}
.nav-link {
  position: relative;
  padding: 6px 12px;
  color: rgba(255,255,255,0.7);
  font-family: 'DM Sans', 'Space Grotesk', system-ui, sans-serif;
  font-weight: 500;
  font-size: 14px;
  text-decoration: none;
  border-radius: 8px;
  transition: color 0.15s ease, box-shadow 0.15s ease;
  white-space: nowrap;
  outline: none;
}
.nav-link:hover { color: #ffffff; }
.nav-link:focus-visible,
.nav-link:active {
  box-shadow: 0 0 0 2px var(--brand-orange);
}
.nav-link-active {
  color: #ffffff;
  box-shadow: 0 0 0 2px var(--brand-orange);
}

/* Language Switcher (globe dropdown) */
.lang-switcher { position: relative; }
.lang-switcher-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  color: rgba(255,255,255,0.9);
  background: none;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.15s ease;
  white-space: nowrap;
}
.lang-switcher-btn:hover { color: #ffffff; }
.globe-icon { width: 16px; height: 16px; flex-shrink: 0; }
.chevron-icon {
  width: 16px; height: 16px; flex-shrink: 0;
  transition: transform 0.2s ease;
}
.lang-dropdown {
  position: absolute;
  right: 0;
  top: calc(100% + 8px);
  width: 180px;
  background: rgba(15,15,15,0.95);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  overflow: hidden;
  z-index: 60;
  opacity: 0;
  transform: translateY(-10px) scale(0.95);
  pointer-events: none;
  transition: opacity 0.15s ease, transform 0.15s ease;
}
.lang-dropdown.open {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}
.lang-dropdown-up {
  top: auto;
  bottom: calc(100% + 8px);
  transform: translateY(10px) scale(0.95);
}
.lang-dropdown-up.open { transform: translateY(0) scale(1); }
.lang-option {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 12px 16px;
  border: none;
  background: none;
  color: rgba(255,255,255,0.8);
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  text-align: left;
  transition: background 0.15s, color 0.15s;
}
.lang-option:hover { background: rgba(255,255,255,0.1); color: #fff; }
.lang-option-active { background: rgba(239,166,52,0.2); color: var(--brand-orange); }
.lang-dot {
  width: 8px; height: 8px;
  background: var(--brand-orange);
  border-radius: 50%;
}

/* Mobile Menu Button (hamburger) */
.mobile-menu-btn {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 5px;
  width: 40px; height: 40px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  margin-right: -8px;
  position: relative;
  z-index: 57;
  border-radius: 8px;
}
@media (min-width: 768px) {
  .mobile-menu-btn { display: none; }
}
.hamburger-line {
  display: block;
  width: 20px; height: 2px;
  background: #fff;
  border-radius: 999px;
  transition: transform 0.25s ease, opacity 0.25s ease;
  transform-origin: center;
}
.mobile-menu-btn.open .hamburger-line:nth-child(1) {
  transform: translateY(7px) rotate(45deg);
}
.mobile-menu-btn.open .hamburger-line:nth-child(2) {
  opacity: 0; transform: scaleX(0);
}
.mobile-menu-btn.open .hamburger-line:nth-child(3) {
  transform: translateY(-7px) rotate(-45deg);
}

/* Mobile Overlay */
.mobile-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
  z-index: 55;
}
.mobile-overlay.open { opacity: 1; pointer-events: auto; }
@media (min-width: 768px) {
  .mobile-overlay { display: none; }
}

/* Mobile Menu Panel */
.mobile-menu {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 100%; max-width: 384px;
  background: var(--bg);
  border-left: 1px solid rgba(255,255,255,0.1);
  z-index: 56;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
}
.mobile-menu.open { transform: translateX(0); }
@media (min-width: 768px) {
  .mobile-menu { display: none !important; }
}
.mobile-menu-content {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding: 96px 24px 32px;
}
.mobile-nav { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.mobile-nav-link {
  display: block;
  padding: 12px 16px;
  font-size: 18px;
  color: rgba(255,255,255,0.9);
  font-family: inherit;
  font-weight: 500;
  text-decoration: none;
  border-radius: 8px;
  transition: background 0.15s, color 0.15s;
}
.mobile-nav-link:hover { background: rgba(255,255,255,0.05); color: #fff; }
.mobile-nav-active { color: var(--brand-orange); }
.mobile-lang-section {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  border-top: 1px solid rgba(255,255,255,0.1);
}
.mobile-lang-label { color: rgba(255,255,255,0.6); font-size: 14px; }
.mobile-cta {
  display: block;
  width: 100%;
  text-align: center;
  background: var(--brand-orange);
  color: #fff;
  padding: 12px 24px;
  border-radius: 8px;
  font-family: inherit;
  font-weight: 600;
  font-size: 16px;
  text-decoration: none;
  transition: background 0.15s;
  margin-top: 16px;
}
.mobile-cta:hover { background: var(--brand-orange-dark); }

/* ============ Chat Area ============ */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 28px 16px 120px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  position: relative;
  max-width: 42rem;
  margin: 0 auto;
  width: 100%;
}
/* Custom scrollbar */
.chat-area::-webkit-scrollbar { width: 6px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
.chat-area::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

/* ============ Messages ============ */
.msg {
  max-width: 80%;
  animation: msgIn var(--dur-slow) var(--ease-out);
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(12px) scale(0.97); filter: blur(4px); }
  to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}
.msg-ai { align-self: flex-start; }
.msg-user { align-self: flex-end; }
.msg-bubble {
  padding: 16px 20px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.6;
  word-wrap: break-word;
}
.msg-ai .msg-bubble {
  background: rgba(255,255,255,0.1);
  color: #e5e7eb;
  border-radius: 16px;
  border-top-left-radius: 4px;
  margin-left: 36px;
  position: relative;
}
/* AI avatar indicator */
.msg-ai .msg-bubble::after {
  content: '';
  position: absolute;
  left: -36px;
  bottom: 4px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.1);
}
.msg-user .msg-bubble {
  background: rgba(239,166,52,0.2);
  color: #ffffff;
  border-radius: 16px;
  border-top-right-radius: 4px;
}
.msg-ai .msg-bubble p { margin: 0 0 10px; }
.msg-ai .msg-bubble p:last-child { margin-bottom: 0; }

/* ============ Quick Reply Chips ============ */
.quick-replies {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 12px;
  margin-left: 36px;
}
.chip {
  padding: 10px 20px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-pill);
  background: rgba(255,255,255,0.05);
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--dur-normal) var(--ease-out);
  white-space: nowrap;
}
.chip:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(239,166,52,0.5);
  color: var(--text);
  transform: translateY(-2px);
}
.chip:active { transform: translateY(0) scale(0.96); }

/* ============ Typing Indicator ============ */
.typing-indicator {
  align-self: flex-start;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 14px 18px;
  background: rgba(255,255,255,0.1);
  border-radius: 16px;
  border-top-left-radius: 4px;
  margin-left: 36px;
}
.typing-dot {
  width: 6px;
  height: 6px;
  background: #9ca3af;
  border-radius: 50%;
  animation: typingPulse 1.6s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingPulse {
  0%, 60%, 100% { transform: translateY(0) scale(1); opacity: 0.35; }
  30% { transform: translateY(-5px) scale(1.15); opacity: 1; }
}

/* ============ Playlist Cards (in chat) ============ */
.recommendations-block {
  width: 100%;
  max-width: 100%;
  align-self: flex-start;
  animation: recsIn 0.5s var(--ease-out);
}
@keyframes recsIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.daypart-section { margin-bottom: 20px; }
.zone-section { margin-bottom: 28px; }
.zone-section:last-child { margin-bottom: 0; }
.zone-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  margin-bottom: 16px;
  background: rgba(239, 166, 52, 0.12);
  border: 1px solid rgba(239, 166, 52, 0.25);
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  color: #EFA634;
  letter-spacing: -0.2px;
}
.zone-header svg { color: #EFA634; }
.schedule-toggle {
  display: flex;
  gap: 4px;
  padding: 3px;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 16px;
}
.schedule-toggle button {
  padding: 6px 16px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.schedule-toggle button.active {
  background: rgba(239, 166, 52, 0.2);
  color: #EFA634;
  font-weight: 600;
}
.daypart-section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  font-size: 15px;
  color: var(--text);
}
.daypart-section-header strong {
  font-family: inherit;
  letter-spacing: -0.2px;
}
.daypart-icon {
  width: 20px;
  height: 20px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.daypart-icon svg {
  width: 16px;
  height: 16px;
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.daypart-icon.sunrise svg { stroke: #fbbf24; }
.daypart-icon.sun svg     { stroke: #f87171; }
.daypart-icon.sunset svg  { stroke: #fb923c; }
.daypart-icon.moon svg    { stroke: #818cf8; }
.daypart-icon.stars svg   { stroke: #a78bfa; }

.playlist-cards { display: grid; gap: 12px; }
.playlist-card {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 20px;
  animation: cardIn var(--dur-slow) var(--ease-out) both;
  transition: all var(--dur-normal) var(--ease-out);
  position: relative;
  overflow: hidden;
}
/* Accent shine on top edge */
.playlist-card::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-soft), transparent);
  opacity: 0;
  transition: opacity var(--dur-normal) ease;
}
.playlist-card:nth-child(1) { animation-delay: 0ms; }
.playlist-card:nth-child(2) { animation-delay: 80ms; }
.playlist-card:nth-child(3) { animation-delay: 160ms; }
.playlist-card:nth-child(4) { animation-delay: 240ms; }
.playlist-card:nth-child(5) { animation-delay: 320ms; }
@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.playlist-card:hover {
  background: rgba(255,255,255,0.06);
  border-color: var(--glass-border-hover);
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 0 1px var(--glass-border-hover);
}
.playlist-card:hover::before { opacity: 1; }
.playlist-card.selected {
  border-color: var(--accent);
  background: var(--accent-ultra-light);
}
.playlist-card.selected::before {
  opacity: 1;
  background: linear-gradient(90deg, transparent, var(--accent-soft), transparent);
}
.playlist-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.playlist-name {
  font-family: inherit;
  font-weight: 600;
  color: var(--text);
  font-size: 16px;
  letter-spacing: -0.3px;
}
.match-badge {
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: var(--radius-pill);
  letter-spacing: 0.2px;
  white-space: nowrap;
  transition: all 0.3s;
}
.match-badge.strong {
  background: rgba(34,197,94,0.12);
  color: #4ade80;
  border: 1px solid rgba(34,197,94,0.2);
}
.match-badge.good {
  background: var(--accent-soft);
  color: var(--accent);
  border: 1px solid var(--accent-soft);
}
.match-badge.worth {
  background: rgba(255,255,255,0.06);
  color: var(--text-secondary);
  border: 1px solid var(--glass-border);
}
.playlist-desc {
  color: var(--text-secondary);
  font-size: 13px;
  margin: 0 0 4px;
  line-height: 1.5;
}
.playlist-reason {
  color: var(--accent);
  font-size: 12px;
  font-style: italic;
  margin: 0 0 14px;
  opacity: 0.85;
  line-height: 1.4;
  transition: color 0.3s;
}
.playlist-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.preview-link {
  color: var(--accent);
  font-size: 12px;
  font-weight: 600;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border: 1px solid var(--accent-soft);
  border-radius: var(--radius-pill);
  background: var(--accent-ultra-light);
  transition: all var(--dur-fast) ease;
}
.preview-link:hover {
  color: var(--text);
  text-decoration: none;
  background: var(--accent-soft);
  border-color: var(--accent);
}
.preview-link svg { width: 13px; height: 13px; }
.select-btn {
  height: 36px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-pill);
  background: rgba(255,255,255,0.03);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all var(--dur-fast) ease;
  padding: 0 14px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  font-family: inherit;
}
.select-btn:hover {
  border-color: var(--accent-soft);
  color: var(--text-secondary);
  background: rgba(255,255,255,0.06);
}
.select-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
.select-btn.active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}
.select-btn.active svg { stroke-width: 2.5; }

/* ============ Beat Breeze Preview Tracks ============ */
.bb-preview-tracks {
  margin: 10px 0 14px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md, 8px);
  max-height: 320px;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: var(--accent-soft) transparent;
}
.bb-track {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--glass-border);
  transition: background var(--dur-fast) ease;
}
.bb-track:last-child { border-bottom: none; }
.bb-track:hover { background: rgba(255,255,255,0.04); }
.bb-track.playing { background: var(--accent-ultra-light); }
.bb-play-btn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--accent-soft);
  background: rgba(255,255,255,0.03);
  color: var(--accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all var(--dur-fast) ease;
  font-size: 0;
}
.bb-play-btn:hover {
  background: var(--accent-soft);
  border-color: var(--accent);
}
.bb-play-btn svg { width: 12px; height: 12px; }
.bb-track-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.bb-track-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bb-track-artist {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bb-track-dur {
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
}
.bb-progress {
  width: 60px;
  height: 3px;
  background: var(--glass-border);
  border-radius: 2px;
  overflow: hidden;
  flex-shrink: 0;
  display: none;
}
.bb-track.playing .bb-progress { display: block; }
.bb-progress-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.2s linear;
}

/* ============ Send to Design Team button ============ */
.send-brief-block {
  width: 100%;
  align-self: flex-start;
  animation: msgIn 0.3s var(--ease-out), briefPulse 3s ease-in-out 1s 1;
}
@keyframes briefPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
  50% { box-shadow: 0 0 0 8px rgba(34,197,94,0.12); }
}
.send-brief-btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: var(--radius);
  background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
  color: #fff;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.2px;
  cursor: pointer;
  transition: all var(--dur-normal) var(--ease-out);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.send-brief-btn:hover {
  box-shadow: 0 4px 20px rgba(34,197,94,0.3);
  transform: translateY(-2px);
}
.send-brief-btn:active { transform: scale(0.98); }
.send-brief-btn svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
}

/* ============ Schedule Summary Review ============ */
.schedule-summary {
  width: 100%;
  align-self: flex-start;
  animation: recsIn 0.5s var(--ease-out);
}
.schedule-summary-header {
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 16px;
  letter-spacing: -0.3px;
}
.schedule-narrative {
  color: var(--text-secondary);
  font-size: 13px;
  line-height: 1.5;
  padding: 12px 16px;
  margin-bottom: 12px;
  border-left: 2px solid var(--accent);
  background: var(--accent-ultra-light);
  border-radius: 0 8px 8px 0;
}
.schedule-daypart {
  margin-bottom: 16px;
}
.schedule-daypart-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.schedule-entry {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  margin-bottom: 6px;
  transition: all var(--dur-fast) ease;
}
.schedule-entry-info {
  flex: 1;
  min-width: 0;
}
.schedule-entry-name {
  font-weight: 600;
  font-size: 14px;
  color: var(--text);
  margin-bottom: 2px;
}
.schedule-entry-reason {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.schedule-remove-btn {
  background: none;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-pill);
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px 10px;
  font-size: 11px;
  font-family: inherit;
  font-weight: 500;
  transition: all var(--dur-fast) ease;
  margin-left: 12px;
  flex-shrink: 0;
}
.schedule-remove-btn:hover {
  border-color: var(--error);
  color: var(--error);
  background: var(--error-soft);
}
.schedule-empty {
  color: var(--text-muted);
  font-size: 13px;
  font-style: italic;
  padding: 8px 0;
}
.schedule-footer {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}
.schedule-back-btn {
  flex: 1;
  padding: 14px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  background: rgba(255,255,255,0.03);
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--dur-fast) ease;
  text-align: center;
}
.schedule-back-btn:hover {
  border-color: var(--glass-border-hover);
  background: rgba(255,255,255,0.06);
  color: var(--text);
}

/* ============ Submission Panel ============ */
.submission-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: flex-end;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
.submission-overlay.visible { display: flex; }
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.submission-panel {
  background: rgba(15,15,15,0.95);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.1);
  border-bottom: none;
  border-radius: 16px 16px 0 0;
  padding: 24px 32px 32px;
  width: 100%;
  max-width: 560px;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp 0.35s var(--ease-out);
  box-shadow: 0 -8px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
}
.submission-panel::-webkit-scrollbar { width: 6px; }
.submission-panel::-webkit-scrollbar-track { background: transparent; }
.submission-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.submission-panel h3 {
  font-family: inherit;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  letter-spacing: -0.3px;
}
.submission-panel .close-btn {
  width: 34px;
  height: 34px;
  border: 1px solid var(--glass-border);
  background: rgba(255,255,255,0.04);
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  transition: all var(--dur-fast) ease;
}
.submission-panel .close-btn:hover {
  background: rgba(255,255,255,0.08);
  color: var(--text);
  border-color: var(--glass-border-hover);
}
.submission-panel .field { margin-bottom: 14px; }
.submission-panel label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.submission-panel input,
.submission-panel select {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: inherit;
  background: rgba(255,255,255,0.03);
  color: var(--text);
  transition: all var(--dur-fast) ease;
}
.submission-panel input::placeholder { color: var(--text-muted); }
.submission-panel input:focus,
.submission-panel select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-ultra-light);
  background: rgba(255,255,255,0.05);
}
.submission-panel .field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.product-toggle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.product-card {
  padding: 14px;
  border: 1.5px solid var(--glass-border);
  border-radius: var(--radius);
  text-align: center;
  cursor: pointer;
  transition: all var(--dur-normal) var(--ease-out);
  background: rgba(255,255,255,0.02);
  position: relative;
}
.product-card:hover {
  border-color: var(--glass-border-hover);
  background: rgba(255,255,255,0.04);
}
.product-card.selected {
  border-color: var(--accent);
  background: var(--accent-ultra-light);
  box-shadow: 0 0 16px var(--accent-ultra-light);
}
.product-card .check-indicator {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: scale(0.5);
  transition: all 0.2s ease;
}
.product-card.selected .check-indicator {
  opacity: 1;
  transform: scale(1);
}
.product-card .check-indicator svg {
  width: 11px;
  height: 11px;
  stroke: #fff;
  fill: none;
  stroke-width: 2.5;
}
.product-card .product-name {
  font-family: 'Space Grotesk', monospace;
  font-weight: 700;
  font-size: 14px;
  color: var(--text);
}
.product-card .product-desc {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}
.product-card input { display: none; }

.submit-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius);
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
  color: var(--text-on-accent);
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.2px;
  cursor: pointer;
  transition: all var(--dur-normal) var(--ease-out);
  margin-top: 8px;
}
.submit-btn:hover {
  box-shadow: 0 4px 20px var(--accent-glow);
  transform: translateY(-1px);
}
.submit-btn:active { transform: translateY(0) scale(0.98); }
.submit-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* ============ Post-Submit Actions ============ */
.post-submit-actions {
  display: flex;
  justify-content: center;
  padding: 12px 0 8px;
}
.design-another-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  background: transparent;
  color: var(--accent);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--dur-normal) var(--ease-out);
}
.design-another-btn:hover {
  background: var(--accent);
  color: var(--text-on-accent);
  box-shadow: 0 4px 16px var(--accent-glow);
  transform: translateY(-1px);
}
.design-another-btn:active { transform: translateY(0) scale(0.98); }
.design-another-btn svg { flex-shrink: 0; }

/* ============ Input Bar ============ */
.input-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 40;
  padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
  background: linear-gradient(to top, rgba(15,15,15,0.95) 60%, transparent);
  pointer-events: none;
}
.input-bar > * { pointer-events: auto; }
.input-hint {
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 8px;
  opacity: 0.5;
  letter-spacing: 0.2px;
  transition: opacity 0.3s;
  max-width: 42rem;
  margin-left: auto;
  margin-right: auto;
}
.input-bar-inner {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  max-width: 42rem;
  margin: 0 auto;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 8px 8px 8px 16px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
  transition: border-color var(--dur-fast) ease, box-shadow var(--dur-fast) ease;
}
.input-bar-inner:focus-within {
  border-color: rgba(239,166,52,0.5);
  box-shadow: 0 0 0 2px rgba(239,166,52,0.15), 0 20px 25px -5px rgba(0,0,0,0.1);
}
.input-bar textarea {
  flex: 1;
  padding: 10px 8px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-family: inherit;
  background: transparent;
  color: var(--text);
  resize: none;
  max-height: 120px;
  min-height: 44px;
  line-height: 1.45;
  overflow-y: auto;
}
.input-bar textarea:focus {
  outline: none;
}
.input-bar textarea::placeholder { color: var(--text-muted); }
.input-btn {
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--dur-fast) var(--ease-out);
  flex-shrink: 0;
  font-family: inherit;
}
.send-btn {
  background: var(--brand-orange);
  color: #ffffff;
}
.send-btn:hover:not(:disabled) {
  background: var(--brand-orange-dark);
  box-shadow: 0 0 16px rgba(239,166,52,0.3);
  transform: scale(1.05);
}
.send-btn:active:not(:disabled) { transform: scale(0.93); }
.send-btn:disabled { opacity: 0.2; cursor: not-allowed; }
.send-btn svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
}
.mic-btn {
  background: rgba(255,255,255,0.06);
  color: var(--text-muted);
  border: none;
  border-radius: 8px;
}
.mic-btn:hover {
  color: var(--brand-orange);
  background: rgba(239,166,52,0.1);
}
.mic-btn.recording {
  background: var(--error-soft);
  color: var(--error);
  border-color: var(--error);
  animation: micPulse 1.5s ease-in-out infinite;
}
@keyframes micPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.25); }
  50% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
}
.mic-btn svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
}

/* ============ Toast ============ */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: 14px 24px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  z-index: 999;
  transition: transform 0.3s var(--ease-out);
  max-width: 90%;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid transparent;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success {
  background: rgba(34,197,94,0.2);
  color: #4ade80;
  border-color: rgba(34,197,94,0.3);
}
.toast.error {
  background: rgba(239,68,68,0.2);
  color: #f87171;
  border-color: rgba(239,68,68,0.3);
}

/* ============ Spinner ============ */
.spinner {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ============ Honeypot ============ */
.hp-field { position: absolute; left: -9999px; opacity: 0; height: 0; }

/* ============ Welcome Hero ============ */
.welcome-hero {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  text-align: left;
  min-height: 100vh;
  padding: 84px 24px 80px;
  overflow: hidden;
  background: var(--bg);
}
@media (min-width: 768px) {
  .welcome-hero { padding-top: 100px; }
}
.welcome-hero.exiting {
  opacity: 0;
  transform: translateY(-24px) scale(0.97);
  transition: all 0.35s var(--ease-out);
  pointer-events: none;
}
/* Hero background image — extended to match website inner pages depth */
.hero-bg {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 70%;
  z-index: 0;
  overflow: hidden;
}
.hero-bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 20%;
  opacity: 0.6;
}
/* Gradient overlay — fades image to solid dark like website inner pages */
.hero-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 70%;
  background: linear-gradient(to bottom, rgba(15,15,15,0.6) 0%, rgba(26,26,46,0.4) 50%, rgba(26,26,46,0.85) 90%, var(--brand-navy) 100%);
  z-index: 1;
}
/* Content sits above overlay */
.welcome-content {
  position: relative;
  z-index: 2;
  max-width: 56rem;
  margin: 0 auto;
  width: 100%;
  animation: welcomeFadeIn 0.8s var(--ease-out);
}
@keyframes welcomeFadeIn {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
.welcome-label {
  display: block;
  font-family: 'Space Grotesk', monospace;
  font-size: 12px;
  color: var(--brand-orange);
  text-transform: uppercase;
  letter-spacing: 0.3em;
  margin-bottom: 16px;
}
.welcome-title {
  font-family: 'Libre Caslon Text', Georgia, serif;
  font-size: clamp(2.5rem, 5vw, 4.5rem);
  font-weight: 400;
  color: #ffffff;
  letter-spacing: -0.5px;
  line-height: 1.1;
  margin-bottom: 16px;
}
.gradient-text {
  color: var(--brand-orange);
  -webkit-text-fill-color: var(--brand-orange);
  font-style: italic;
}
.welcome-subtitle {
  font-family: 'DM Sans', sans-serif;
  font-size: 18px;
  color: rgba(255,255,255,0.5);
  line-height: 1.65;
  max-width: 520px;
  margin: 0 0 48px;
}
.welcome-tagline { display: none; /* removed — redundant on bmasiamusic.com */
}
/* Product Selector (SYB / Beat Breeze) */
.product-selector {
  display: flex;
  gap: 12px;
  justify-content: flex-start;
  margin: 0 0 40px;
  max-width: 420px;
}
.product-btn {
  flex: 1;
  padding: 14px 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 0;
  cursor: pointer;
  text-align: center;
  color: var(--text-secondary);
  transition: all var(--dur-normal) var(--ease-out);
  font-family: inherit;
}
.product-btn:hover {

.mode-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  width: 100%;
  max-width: 680px;
  margin: 0;
}
.mode-card {

  flex-direction: column;
  align-items: flex-start;
  gap: 12px;
  padding: 24px 24px;
  background: transparent;
  border: none;

  color: var(--text);
  font-family: inherit;
}
.mode-card:last-child {
  border-right: none;
}
.mode-card:hover {
  background: rgba(255,255,255,0.03);
  transform: none;
  box-shadow: none;
}
.mode-card:active {

  height: 40px;

  border: 1px solid rgba(239,166,52,0.2);

  align-items: center;
  justify-content: center;
  flex-shrink: 0;

  border-color: rgba(239,166,52,0.4);
  transform: scale(1.08);
}
.mode-card-icon svg {
  width: 20px;
  height: 20px;
  stroke: var(--brand-orange);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.mode-card-title {
  display: block;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.2px;
  color: #ffffff;
}
.mode-card-desc {
  display: block;
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  margin-top: 2px;
  line-height: 1.4;

/* ============ Responsive ============ */
@media (min-width: 768px) {
  .header-inner { padding: 0 32px; }
}
@media (min-width: 1024px) {
  .header-inner { padding: 0 64px; }
}
@media (max-width: 640px) {
  .chat-area { padding: 16px 14px 120px; gap: 16px; }
  .msg { max-width: 88%; }
  .msg-bubble { padding: 14px 16px; font-size: 14px; }
  /* Hide AI avatar on mobile */
  .msg-ai .msg-bubble { margin-left: 0; }
  .msg-ai .msg-bubble::after { display: none; }
  .quick-replies { margin-left: 0; }
  .submission-panel { max-width: 100%; }
  .submission-panel .field-row { grid-template-columns: 1fr; }
  .playlist-card { padding: 16px; }
  .playlist-name { font-size: 14px; }
  .match-badge { font-size: 12px; padding: 4px 10px; }
  /* Reduce blur on mobile for performance */
  .msg-ai .msg-bubble,
  .playlist-card,
  .chip {
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  /* Welcome hero mobile */
  .welcome-hero { min-height: calc(100vh - 64px); padding: 40px 16px 80px; align-items: flex-start; }
  .welcome-subtitle { font-size: 15px; margin-bottom: 32px; }
  .mode-cards { grid-template-columns: 1fr; gap: 0; }
  .mode-card { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08); flex-direction: row; padding: 18px 16px; }
  .mode-card:last-child { border-bottom: none; }
  /* Input bar mobile */
  .input-bar { padding: 12px 12px calc(12px + env(safe-area-inset-bottom)); }
  .input-bar-inner { border-radius: 14px; padding: 6px 6px 6px 12px; }
}
@media (max-width: 420px) {
  .input-bar { padding: 10px 10px calc(10px + env(safe-area-inset-bottom)); }
  .chip { padding: 8px 14px; font-size: 12px; }
  .mode-card { padding: 14px 16px; }
  .mode-card-icon { width: 36px; height: 36px; border-radius: 10px; }
  .mode-card-icon svg { width: 18px; height: 18px; }
}
/* Respect reduced motion preference */
@media (prefers-reduced-motion: reduce) {
  .msg { animation-duration: 0.1s; }
  .welcome-content { animation-duration: 0.1s; }
}
/* Fallback for browsers without backdrop-filter */
@supports not (backdrop-filter: blur(1px)) {
  .msg-ai .msg-bubble,
  .typing-indicator,
  .chip,
  .playlist-card,
  .mode-card {
    background: var(--bg-elevated);
    border-color: var(--border-strong);
  }
  .header {
    background: rgba(15,15,15,0.95);
  }
  .input-bar-inner {
    background: var(--bg-elevated);
    border-color: var(--border-strong);
  }
  .submission-panel {
    background: var(--bg-elevated);
  }
}

/* ============ Structured Questionnaire ============ */
.sq-card {
  padding: 20px 24px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);

}
.sq-card::after {
  content: '';
  position: absolute;
  left: -36px;
  bottom: 4px;
  width: 24px;
  height: 24px;

  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.1);
}
.sq-header {
  display: flex;
  align-items: flex-start;

  margin-bottom: 16px;

.sq-question {

.sq-options {

.sq-option {

.sq-option-num {

.sq-option-content {

.sq-option-label {

}
.sq-option-desc {

}
.sq-option.selected {

  border-color: rgba(239,166,52,0.4);
}

  color: #fff;
}
.sq-footer {

  gap: 8px;

.sq-custom-input {

}
.sq-skip-btn {

}

}
.sq-confirm-btn {
  padding: 8px 20px;

  border-radius: var(--radius-pill);

}

  background: var(--brand-orange-dark);

/* Answered state */
.sq-card.sq-answered {

let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (i18n[lang][key]) el.innerHTML = i18n[lang][key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (i18n[lang][key]) el.placeholder = i18n[lang][key];
  });
}

function toggleMobileMenu() {
  const btn = document.getElementById('mobileMenuBtn');
  const menu = document.getElementById('mobileMenu');
  const overlay = document.getElementById('mobileOverlay');
  const isOpen = menu.classList.contains('open');
  if (isOpen) { closeMobileMenu(); return; }
  btn.classList.add('open');
  btn.setAttribute('aria-expanded', 'true');
  btn.setAttribute('aria-label', 'Close menu');
  menu.classList.add('open');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeMobileMenu() {
  const btn = document.getElementById('mobileMenuBtn');
  const menu = document.getElementById('mobileMenu');
  const overlay = document.getElementById('mobileOverlay');
  btn.classList.remove('open');
  btn.setAttribute('aria-expanded', 'false');
  btn.setAttribute('aria-label', 'Open menu');
  menu.classList.remove('open');
  overlay.classList.remove('open');
  if (!document.body.classList.contains('welcome-active')) {
    document.body.style.overflow = '';
  }
}
function toggleLangDropdown(e) {
  e && e.stopPropagation();
  const dd = document.getElementById('desktopLangDropdown');
  const isOpen = dd.classList.contains('open');
  closeAllDropdowns();
  if (!isOpen) dd.classList.add('open');
}
function toggleMobileLangDropdown(e) {
  e && e.stopPropagation();
  const dd = document.getElementById('mobileLangDropdown');
  const isOpen = dd.classList.contains('open');
  closeAllDropdowns();
  if (!isOpen) dd.classList.add('open');
}
function closeAllDropdowns() {
  document.querySelectorAll('.lang-dropdown').forEach(d => d.classList.remove('open'));
}
function switchLang(lang) {
  setLang(lang);
  closeAllDropdowns();
  closeMobileMenu();
  const label = lang === 'en' ? 'English' : '\u0e44\u0e17\u0e22';
  document.getElementById('desktopLangLabel').textContent = label;
  document.getElementById('mobileLangLabel').textContent = label;
  document.querySelectorAll('.lang-option').forEach(opt => {
    const isActive = opt.getAttribute('data-lang') === lang;
    opt.classList.toggle('lang-option-active', isActive);
    const dot = opt.querySelector('.lang-dot');
    if (isActive && !dot) {
      const d = document.createElement('span');
      d.className = 'lang-dot';
      opt.appendChild(d);
    } else if (!isActive && dot) {
      dot.remove();
    }
  });
  updateNavLocale(lang);
}
function updateNavLocale(lang) {
  document.querySelectorAll('[data-nav]').forEach(link => {
    let href = link.getAttribute('href');
    href = href.replace(/^\/(en|th)(\/|$)/, `/${lang}$2`);
    link.setAttribute('href', SITE_BASE + href);
  });
  const cta = document.querySelector('.mobile-cta');
  if (cta) cta.setAttribute('href', SITE_BASE + `/${lang}/quotation/`);
}
document.addEventListener('mousedown', (e) => {
  if (!e.target.closest('.lang-switcher')) closeAllDropdowns();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeMobileMenu(); closeAllDropdowns(); }
});
// On load: if not proxied, prefix nav links with full domain
if (SITE_BASE) updateNavLocale(currentLang);

// =========================================================================
// Beat Breeze Audio Preview Player
// =========================================================================
const bbAudio = new Audio();
bbAudio.preload = 'none';
bbAudio.crossOrigin = 'anonymous';
let bbCurrentTrackEl = null;

function formatDuration(seconds) {
  if (!seconds || seconds <= 0) return '';
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function bbPlayTrack(btn) {
  const trackEl = btn.closest('.bb-track');
  const url = trackEl.dataset.audioUrl;
  if (!url) return;

  // If same track is playing, toggle pause
  if (bbCurrentTrackEl === trackEl && !bbAudio.paused) {
    bbAudio.pause();
    trackEl.classList.remove('playing');
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>';
    return;
  }

  // Stop previous
  if (bbCurrentTrackEl) {
    bbCurrentTrackEl.classList.remove('playing');
    const prevBtn = bbCurrentTrackEl.querySelector('.bb-play-btn');
    if (prevBtn) prevBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>';
    const prevFill = bbCurrentTrackEl.querySelector('.bb-progress-fill');
    if (prevFill) prevFill.style.width = '0%';
  }

  // Play new
  bbCurrentTrackEl = trackEl;
  trackEl.classList.add('playing');
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
  bbAudio.src = url;
  bbAudio.load();
  bbAudio.play().catch(err => {
    console.error('Audio play failed:', err.name, err.message);
    trackEl.classList.remove('playing');
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>';
  });
}

bbAudio.addEventListener('timeupdate', () => {
  if (!bbCurrentTrackEl) return;
  const fill = bbCurrentTrackEl.querySelector('.bb-progress-fill');
  // 15-second cap (safety net — server already limits bytes)
  if (bbAudio.currentTime >= 15) {
    bbAudio.pause();
    bbCurrentTrackEl.classList.remove('playing');
    const btn = bbCurrentTrackEl.querySelector('.bb-play-btn');
    if (btn) btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>';
    if (fill) fill.style.width = '100%';
    return;
  }
  if (fill) fill.style.width = `${(bbAudio.currentTime / 15) * 100}%`;
});

bbAudio.addEventListener('ended', () => {
  if (!bbCurrentTrackEl) return;
  bbCurrentTrackEl.classList.remove('playing');
  const btn = bbCurrentTrackEl.querySelector('.bb-play-btn');
  if (btn) btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>';
  const fill = bbCurrentTrackEl.querySelector('.bb-progress-fill');
  if (fill) fill.style.width = '0%';
  bbCurrentTrackEl = null;
});

bbAudio.addEventListener('error', () => {
  if (!bbCurrentTrackEl) return;
  bbCurrentTrackEl.classList.remove('playing');
  const btn = bbCurrentTrackEl.querySelector('.bb-play-btn');
  if (btn) btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>';
  bbCurrentTrackEl = null;
});

  if (!tracks || tracks.length === 0) return '';
  return `<div class="bb-preview-tracks">
    ${tracks.map(t => `
      <div class="bb-track" data-audio-url="${escHtml(t.audioUrl || '')}">
        <button type="button" class="bb-play-btn" onclick="bbPlayTrack(this)"${!t.audioUrl ? ' disabled' : ''}>
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>
        </button>

  if (dayparts && Array.isArray(dayparts) && dayparts.length > 0) {

    daypartLabels = {};
    for (const dp of dayparts) daypartLabels[dp.key] = dp.label;
  } else {
    dpMeta = null;
    orderedKeys = ['morning', 'afternoon', 'evening'];
    daypartLabels = { morning: 'Morning', afternoon: 'Afternoon', evening: 'Evening' };

  const groups = {};
  for (const key of orderedKeys) groups[key] = [];
  for (const rec of recommendations) {
    if (groups[rec.daypart]) groups[rec.daypart].push(rec);

function removeFromSchedule(btn, playlistId) {
  selectedIds.delete(playlistId);

  const card = document.querySelector(`.playlist-card[data-id="${playlistId}"]`);
  if (card) {
    card.classList.remove('selected');
    const selectBtn = card.querySelector('.select-btn');
    if (selectBtn) {
      selectBtn.classList.remove('active');
      const label = selectBtn.querySelector('.select-label');
      if (label) label.textContent = i18n[currentLang].add_to_brief;
    }
  }

  // Remove the entry from schedule
  const entry = btn.closest('.schedule-entry');
  if (entry) {
    const daypart = entry.closest('.schedule-daypart');
    entry.remove();
    // If no more entries in this daypart, show empty message
    if (daypart && daypart.querySelectorAll('.schedule-entry').length === 0) {
      const emptyEl = document.createElement('div');
      emptyEl.className = 'schedule-empty';
      emptyEl.textContent = i18n[currentLang].schedule_empty;
      daypart.appendChild(emptyEl);
    }
  }
}

function selectMode(mode, chipEl) {
  currentMode = mode;

  // Handle welcome hero fade-out
  const hero = document.getElementById('welcomeHero');
  if (hero) {
    hero.classList.add('exiting');
    setTimeout(() => {
      hero.remove();
      document.body.classList.remove('welcome-active');
      document.body.classList.add('chat-active');
    }, 350);
  }

  // Remove chips after selection (for non-hero chips later in conversation)
  const chips = chipEl?.closest('.quick-replies');
  if (chips) chips.remove();

  const t = i18n[currentLang];
  const labels = { new: t.chip_new, event: t.chip_event, update: t.chip_update };

  // Small delay so the hero exit animation is visible
  const delay = hero ? 150 : 0;
  setTimeout(() => sendMessage(labels[mode]), delay);
}

// =========================================================================
// Send message + SSE streaming
// =========================================================================
async function sendMessage(text) {
  const input = document.getElementById('chatInput');
  const msg = text || input.value.trim();
  if (!msg || isStreaming) return;

  // Add user message to UI
  addUserMessage(msg);
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  // Hide hint after first user message
  const hint = document.getElementById('inputHint');
  if (hint) hint.style.display = 'none';

  // Add to history
  conversationHistory.push({ role: 'user', content: msg });

  isStreaming = true;
  showTypingIndicator();

  try {
    const res = await fetch(`${API_BASE}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: msg,
        history: conversationHistory.slice(0, -1), // exclude the current msg (server adds it)
        mode: currentMode,
        language: currentLang,
        product: currentProduct,
        pendingToolUse: pendingToolUse || undefined,
      }),
    });

    // Clear pendingToolUse after sending
    pendingToolUse = null;

    if (!res.ok) {
      throw new Error('Chat request failed');
    }

    hideTypingIndicator();

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let streamingEl = null;
    let fullText = '';
    let recommendationsReceived = false;
    captureNarrative = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const jsonStr = line.slice(6);
        if (!jsonStr.trim()) continue;

        let event;
        try { event = JSON.parse(jsonStr); } catch { continue; }

        switch (event.type) {
          case 'text':
            // Full text message (non-streamed)
            fullText = event.content;
            if (!streamingEl) streamingEl = createStreamingMessage();
            streamingEl.innerHTML = formatMarkdown(event.content);
            scrollToBottom();
            break;

          case 'text_delta':
            // Streaming text chunk
            if (!streamingEl) streamingEl = createStreamingMessage();
            fullText += event.content;
            if (captureNarrative) scheduleNarrative += event.content;
            streamingEl.innerHTML = formatMarkdown(fullText);
            scrollToBottom();
            break;

          case 'recommendations':
            recommendationsReceived = true;
            currentRecommendations = event.recommendations || [];
            currentDayparts = event.dayparts || null;
            extractedBrief = event.extractedBrief || null;
            designerNotes = event.designerNotes || '';
            isMultiZone = event.multiZone || false;
            zoneNames = event.zoneNames || [];
            weekendRecommendations = event.weekendRecommendations || null;
            weekendDayparts = event.weekendDayparts || null;
            currentScheduleType = 'weekday';
            selectedIds.clear();
            scheduleNarrative = '';
            captureNarrative = true;

            // Clean up old recommendation UI elements
            document.querySelectorAll('.recommendations-block').forEach(el => {
              el.style.opacity = '0.4';
              el.style.pointerEvents = 'none';
            });
            document.querySelectorAll('.send-brief-block').forEach(el => el.remove());
            const oldSchedule = document.querySelector('.schedule-summary');
            if (oldSchedule) oldSchedule.remove();

            if (isMultiZone) {
              renderMultiZoneRecommendations(currentRecommendations, currentDayparts, designerNotes);
            } else {
              renderRecommendationsInChat(currentRecommendations, currentDayparts, designerNotes);
            }
            break;

          case 'structured_question':
            pendingToolUse = {
              toolUseId: event.toolUseId,
              assistantContent: event.assistantContent,
            };
            renderStructuredQuestion(event);
            break;

          case 'error':
            if (!streamingEl) streamingEl = createStreamingMessage();
            streamingEl.textContent = event.content || 'Something went wrong.';
            streamingEl.style.color = 'var(--error)';
            break;

          case 'done':
            break;
        }
      }
    }

    // Save assistant response to history
    if (fullText) {
      conversationHistory.push({ role: 'assistant', content: fullText });
    }

    // Show "Send to Design Team" button after recommendations
    if (recommendationsReceived) {
      showSendBriefButton();
    }

  } catch (err) {
    hideTypingIndicator();
    addAIMessage("Sorry, something went wrong. Please try again.");
  } finally {
    isStreaming = false;
    updateSendBtn();
  }
}

function formatMarkdown(text) {
  // Simple markdown: bold, italic, line breaks
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

// =========================================================================
// Structured Questionnaire
// =========================================================================
function renderStructuredQuestion(data) {
  const t = i18n[currentLang];
  const allowMultiple = data.allowMultiple || false;
  const allowCustom = data.allowCustom !== false; // default true
  const allowSkip = data.allowSkip || false;

  const div = document.createElement('div');
  div.className = 'msg msg-ai';

  let paginationHtml = '';
  if (data.questionIndex && data.totalQuestions) {
    paginationHtml = `<span class="sq-pagination">${data.questionIndex} / ${data.totalQuestions}</span>`;
  }

  let optionsHtml = data.options.map((opt, i) => {
    const descHtml = opt.description ? `<span class="sq-option-desc">${escHtml(opt.description)}</span>` : '';
    return `<button class="sq-option" data-value="${escHtml(opt.value)}" data-label="${escHtml(opt.label)}" onclick="selectStructuredOption(this, ${allowMultiple})">
      <span class="sq-option-num">${i + 1}</span>
      <span class="sq-option-content">
        <span class="sq-option-label">${escHtml(opt.label)}</span>
        ${descHtml}
      </span>
    </button>`;
  }).join('');

  let footerHtml = '';
  const footerParts = [];

  if (allowCustom) {
    footerParts.push(`<div class="sq-custom-wrap">
      <input class="sq-custom-input" type="text" placeholder="${escHtml(t.sq_other)}" onkeydown="if(event.key==='Enter'){event.preventDefault();submitCustomAnswer(this)}">
    </div>`);
  }
  if (allowSkip) {
    footerParts.push(`<button class="sq-skip-btn" onclick="submitStructuredAnswer('skip', '${escHtml(t.sq_skip)}')">${t.sq_skip}</button>`);
  }
  if (allowMultiple) {
    footerParts.push(`<button class="sq-confirm-btn" onclick="submitMultiSelect(this)">${t.sq_confirm}</button>`);
  }

  if (footerParts.length > 0) {
    footerHtml = `<div class="sq-footer">${footerParts.join('')}</div>`;
  }

  div.innerHTML = `<div class="sq-card">
    <div class="sq-header">
      <span class="sq-question">${escHtml(data.question)}</span>
      ${paginationHtml}
    </div>
    <div class="sq-options">${optionsHtml}</div>
    ${footerHtml}
  </div>`;

  chatArea.appendChild(div);
  scrollToBottom();
}

function selectStructuredOption(btn, allowMultiple) {
  if (allowMultiple) {
    btn.classList.toggle('selected');
    // Enable/disable confirm button
    const card = btn.closest('.sq-card');
    const confirmBtn = card.querySelector('.sq-confirm-btn');
    const anySelected = card.querySelectorAll('.sq-option.selected').length > 0;
    if (confirmBtn) {
      confirmBtn.classList.toggle('active', anySelected);
    }
  } else {
    // Single select — submit immediately
    const value = btn.dataset.value;
    const label = btn.dataset.label;
    btn.classList.add('selected');
    submitStructuredAnswer(value, label);
  }
}

function submitMultiSelect(confirmBtn) {
  const card = confirmBtn.closest('.sq-card');
  const selected = card.querySelectorAll('.sq-option.selected');
  if (selected.length === 0) return;

  const values = [];
  const labels = [];
  selected.forEach(btn => {
    values.push(btn.dataset.value);
    labels.push(btn.dataset.label);
  });

  submitStructuredAnswer(values.join(', '), labels.join(', '));
}

function submitCustomAnswer(input) {
  const value = input.value.trim();
  if (!value) return;
  submitStructuredAnswer(value, value);
}

function submitStructuredAnswer(value, displayText) {
  // Disable the card
  const cards = chatArea.querySelectorAll('.sq-card:not(.sq-answered)');
  const card = cards[cards.length - 1];
  if (card) card.classList.add('sq-answered');

  // Send as a regular chat message
  sendMessage(displayText || value);
}

// =========================================================================
// Input handling
// =========================================================================
function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  updateSendBtn();
}

function updateSendBtn() {
  const input = document.getElementById('chatInput');
  document.getElementById('sendBtn').disabled = !input.value.trim() || isStreaming;
}

// =========================================================================
// Voice input (Web Speech API)
// =========================================================================
let recognition = null;
let isRecording = false;
let micTimeout = null;

function initVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return;

  document.getElementById('micBtn').style.display = '';

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = currentLang === 'th' ? 'th-TH' : 'en-US';

  recognition.onresult = (event) => {
    let transcript = '';
    for (let i = 0; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }
    document.getElementById('chatInput').value = transcript;
    autoResize(document.getElementById('chatInput'));
  };

  recognition.onend = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    if (micTimeout) { clearTimeout(micTimeout); micTimeout = null; }
  };

  recognition.onerror = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    if (micTimeout) { clearTimeout(micTimeout); micTimeout = null; }
  };
}

function toggleMic() {
  if (!recognition) return;
  recognition.lang = currentLang === 'th' ? 'th-TH' : 'en-US';

  if (isRecording) {
    recognition.stop();
    if (micTimeout) { clearTimeout(micTimeout); micTimeout = null; }
  } else {
    recognition.start();
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    // Auto-stop after 30 seconds to prevent indefinite recording
    micTimeout = setTimeout(() => {
      if (isRecording) recognition.stop();
    }, 30000);
  }
}

// =========================================================================
// Submission
// =========================================================================
let lastContactName = '';
let lastContactEmail = '';

function openSubmission() {
  // Pre-fill venue name from conversation
  const sfVenue = document.getElementById('sfVenue');
  if (sfVenue && !sfVenue.value) sfVenue.value = extractedBrief?.venueName || '';
  // Pre-fill contact info from previous submission
  const sfName = document.getElementById('sfName');
  const sfEmail = document.getElementById('sfEmail');
  if (sfName && !sfName.value && lastContactName) sfName.value = lastContactName;
  if (sfEmail && !sfEmail.value && lastContactEmail) sfEmail.value = lastContactEmail;
  // Set product from hero selection
  document.getElementById('sfProduct').value = currentProduct;
  document.getElementById('submissionOverlay').classList.add('visible');
}

function closeSubmission() {
  document.getElementById('submissionOverlay').classList.remove('visible');
}

function startNewZone() {
  // Reset conversation state
  conversationHistory = [];
  currentMode = null;
  currentRecommendations = [];
  currentDayparts = null;
  extractedBrief = null;
  designerNotes = '';
  selectedIds.clear();
  scheduleNarrative = '';
  captureNarrative = false;
  isMultiZone = false;
  zoneNames = [];
  weekendRecommendations = null;
  weekendDayparts = null;
  currentScheduleType = 'weekday';
  isStreaming = false;
  pendingToolUse = null;
  // Clear chat and show welcome
  chatArea.innerHTML = '';
  showWelcomeState();
  scrollToBottom();
}

function selectProductHero(btn) {
  document.querySelectorAll('.product-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  currentProduct = btn.dataset.product;
  if (currentProduct === 'beatbreeze') {
    document.body.setAttribute('data-theme', 'beatbreeze');
  } else {
    document.body.removeAttribute('data-theme');
  }
}

function selectProduct(card) {
  document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  currentProduct = card.dataset.product;
  if (currentProduct === 'beatbreeze') {
    document.body.setAttribute('data-theme', 'beatbreeze');
  } else {
    document.body.removeAttribute('data-theme');
  }
}

document.getElementById('submitForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = e.target;
  const submitBtn = document.getElementById('submitBriefBtn');

  // Honeypot check
  if (form.website.value) return;

  // Basic validation
  const venueName = form.venueName.value.trim();
  const contactName = form.contactName.value.trim();
  const contactEmail = form.contactEmail.value.trim();
  if (!venueName || !contactName || !contactEmail) {
    showToast(i18n[currentLang].toast_validation, 'error');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner"></span>';

  const formData = new FormData(form);
  const data = Object.fromEntries(formData.entries());

  // Build conversation summary
  const conversationSummary = conversationHistory
    .map(m => `${m.role === 'user' ? 'Customer' : 'AI'}: ${m.content}`)
    .join('\n\n');

  // Save contact info for next submission
  lastContactName = contactName;
  lastContactEmail = contactEmail;

  // Merge location/hours from conversation (no longer in form)
  data.location = extractedBrief?.location || '';
  data.hours = extractedBrief?.hours || '';

  // Merge with chat data
  data.extractedBrief = extractedBrief;
  data.conversationSummary = conversationSummary;
  data.allRecommendations = currentRecommendations;
  data.likedPlaylists = currentRecommendations.filter(r => selectedIds.has(String(r.playlistId)));
  data.daypartsMetadata = currentDayparts;
  data.vibes = extractedBrief?.vibes || [];
  data.energy = extractedBrief?.energy;
  data.venueType = extractedBrief?.venueType || data.venueType;
  data.sybAccountId = extractedBrief?.sybAccountId || null;
  data.mode = currentMode || 'new';
  data.eventDate = extractedBrief?.eventDate || null;
  data.eventTimeRange = extractedBrief?.eventTimeRange || null;
  data.existingScheduleId = extractedBrief?.existingScheduleId || null;
  data.multiZone = isMultiZone;
  data.zoneNames = zoneNames;
  if (weekendRecommendations) {
    data.weekendRecommendations = weekendRecommendations;
    data.weekendDayparts = weekendDayparts;
    data.weekendLikedPlaylists = weekendRecommendations.filter(r => selectedIds.has(String(r.playlistId)));
  }

  try {
    const res = await fetch(`${API_BASE}/submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });

    const result = await res.json();

    if (res.ok && result.success) {
      showToast(i18n[currentLang].toast_success, 'success');
      closeSubmission();
      if (data.mode === 'event' && result.scheduleCreated) {
        const dateFmt = data.eventDate ? new Date(data.eventDate + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }) : 'your event date';
        addAIMessage(`Your event music has been scheduled for ${dateFmt}. The playlist will be activated automatically at the event start time, and your regular music will be restored afterward.`);
      } else if (data.mode === 'update' && result.scheduleCreated) {
        addAIMessage(`Your schedule "${result.scheduleName}" has been updated on your Soundtrack account. The changes are now live.`);
      } else if (result.scheduleCreated) {
        addAIMessage(`Your schedule "${result.scheduleName}" has been created on your Soundtrack account. Our design team will activate it on your zones shortly.`);
      } else if (data.mode === 'event') {
        addAIMessage("Your event music brief has been sent to the design team! They'll set it up and schedule it for your event date.");
      } else {
        addAIMessage("Your brief has been sent to the design team! They'll review your selections and get back to you soon.");
      }
      // Add "Design another zone" option
      const block = document.createElement('div');
      block.className = 'post-submit-actions';
      block.innerHTML = `
        <button class="design-another-btn" onclick="startNewZone()">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          Design another zone / venue
        </button>
      `;
      chatArea.appendChild(block);
      scrollToBottom();
    } else {
      showToast(result.error || i18n[currentLang].toast_error, 'error');
    }
  } catch (err) {
    showToast(i18n[currentLang].toast_error, 'error');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = i18n[currentLang].btn_submit_brief;
  }
});

// Close overlay on background click
document.getElementById('submissionOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeSubmission();
});

// =========================================================================
// Toast
// =========================================================================
function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast ${type} show`;
  setTimeout(() => toast.classList.remove('show'), 4000);
}

// =========================================================================
// Init
// =========================================================================
document.addEventListener('DOMContentLoaded', () => {
  initVoice();

  const header = document.getElementById('mainHeader');

  // Embed mode: hide header when loaded inside iframe (?embed=true)
  const isEmbed = new URLSearchParams(window.location.search).get('embed') === 'true';
  if (isEmbed && header) {
    header.style.display = 'none';
    document.body.style.paddingTop = '0';
    // Also adjust chat area top padding
    const chatArea = document.getElementById('chatArea');
    if (chatArea) chatArea.style.paddingTop = '20px';
  }

  // Header scroll effect (only when not embedded)
  if (!isEmbed) {
    window.addEventListener('scroll', () => {
      header.classList.toggle('scrolled', window.scrollY > 20);
    }, { passive: true });
  }

  // Show immersive welcome state
  showWelcomeState();
});
</script>
